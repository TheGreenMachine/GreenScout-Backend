apiVersion: {{ include "greenscout-backend.deployment.apiVersion" . }}
kind: Deployment
metadata:
  name: {{ include "greenscout-backend.fullname" . }}
  {{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "greenscout-backend.labels" . | nindent 4 }}
spec:
  {{- with .Values.deploymentStrategy }}
  strategy:
    {{- toYaml . | trim | nindent 4 }}
  {{- end }}
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "greenscout-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "greenscout-backend.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "greenscout-backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "test"
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          
          volumeMounts:
          {{- if .Values.secrets.enabled }}
          - name: secrets
            mountPath: "/run/credentials.json"
            subPath: {{ .Values.secrets.credentalsKey | default "credentials.json" }}
            readOnly: true
          - name: secrets
            mountPath: "/conf/credentials.json"
            subPath: {{ .Values.secrets.credentalsKey | default "credentials.json" }}
            readOnly: true
          - name: secrets
            mountPath: "/greenscout.config.yaml"
            subPath: {{ .Values.secrets.configsKey | default "greenscout.config.yaml" }}
            readOnly: true
          - name: secrets
            mountPath: "/run/token.json"
            subPath: {{ .Values.secrets.tokenKey | default "token.json" }}
            readOnly: true
          {{- end }}
          {{- if .Values.nfs.enabled }}
          {{- range .Values.nfs.mounts }}
          - name: {{ .name }}
            mountPath: {{ .mountPath | quote }}
          {{- end }}
          {{- end }}
          {{- if .Values.databaces.enabled }}
          - name: databaces
            mountPath: "/run/databaces"
            subPath: {{ .Values.databaces.existingClaim | default "databaces" }}
            readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

  
      
      volumes:
      {{- if .Values.secrets.enabled }}
        - name: secrets
          secret:
            secretName: {{ .Values.secrets.secretName }}
      {{- end }}
      {{- if .Values.databaces.enabled }}
        - name: databaces
          {{- if .Values.persistence.databaces.enabled }}
            {{- if eq .Values.persistence.databaces.type "pvc" }}
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.databaces.existingClaim }}{{ .Values.persistence.databaces.existingClaim }}{{- else }}{{ template "greenscout-backend.fullname" . }}-databaces{{- end }}
            {{- else if eq .Values.persistence.databaces.type "hostPath" }}
          hostPath:
            path: {{ .Values.persistence.databaces.hostPath }}
            type: Directory
            {{- else }}
          emptyDir: {}
            {{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- end }}
      {{- if .Values.nfs.enabled }}
      {{- range .Values.nfs.mounts }}
        - name: {{ .name }}
          nfs:
            server: {{ .server | quote }}
            path: {{ .path | quote }}
      {{- end }}
      {{- end }}