# Default values for greenscout-backend.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

spec:
  args:
    - "test"

image:
  repository: docker.io/landonmmmmmm/greenscoutbackend
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

service:
  type: ClusterIP
  port: 80

resources: {}
  # you shouldnt need to touch this unless u are really extreamly low on resorces.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  ######## TODO: Add autoscaling values for the backend, and add a section to the README about how to use it ########
# autoscaling:
#   enabled: true
#   minReplicas: 1
#   maxReplicas: 100
#   targetCPUUtilizationPercentage: 80
#   # targetMemoryUtilizationPercentage: 80

# nodeSelector: {}

# tolerations: []

affinity: {}

secrets:
  enabled: true
  # name of the secret containing the credentials
  secretName: "greenscout-backend-secrets"
  credentalsKey: "credentials.json"
  configsKey: "greenscout.config.yaml"
  tokenKey: "token.json"